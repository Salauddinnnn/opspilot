version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: opspilot-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: opspilot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped